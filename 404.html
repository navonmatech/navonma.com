<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Navonma Technologies</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code { font-size: 6rem; font-weight: 800; background: linear-gradient(90deg,#3b82f6,#06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 16px 0 8px; }
    p  { color: rgba(255,255,255,0.5); margin-bottom: 32px; }
    a  {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg,#1e40af,#06b6d4);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
